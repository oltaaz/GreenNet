      - generic [ref=e27]:
        - paragraph [ref=e28]: GreenNet is a capstone project focused on reducing network energy consumption through adaptive control policies. Instead of keeping every link active, GreenNet learns when links can be turned OFF while preserving quality-of-service constraints.
        - paragraph [ref=e29]: This is the official GreenNet demo and product interface. It combines interactive KPI dashboards, comparison/results views, and a simulator canvas that visualizes packet movement under dynamic link states.
        - paragraph [ref=e30]: "The app is API-first: all pages consume backend run data using a single typed client layer (`src/lib/api.ts`) and gracefully fallback when optional endpoints (topology link-state packet-events) are not yet available."
        - paragraph [ref=e31]: The Streamlit dashboard is still available for analyst and developer workflows, but it is now positioned as internal tooling rather than the public-facing product surface.